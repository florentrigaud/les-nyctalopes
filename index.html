<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Nyctalopes - Mes fiches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <section id="auth-section">

      <!-- Boutons bascule -->
      <div id="auth-toggle">
        <button id="btn-show-login" class="active">Se connecter</button>
        <button id="btn-show-register">Créer un compte</button>
      </div>

      <!-- Formulaire Connexion -->
      <form id="login-form">
        <h2>Connexion</h2>
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Mot de passe" required />
        <button type="submit">Se connecter</button>
      </form>

      <!-- Formulaire Inscription (caché par défaut) -->
      <form id="register-form" style="display:none;">
        <h2>Créer un compte</h2>
        <input type="email" id="register-email" placeholder="Email" required />
        <input type="password" id="register-password" placeholder="Mot de passe" required />
        <input type="password" id="register-confirm" placeholder="Confirmer le mot de passe" required />
        <button type="submit">S'inscrire</button>
      </form>

      <!-- Message de retour (erreur / succès) -->
      <p id="auth-message"></p>

    </section>

    <section id="fiches-list" style="display: none;">
      <!-- Les fiches seront chargées ici -->
    </section>
  </main>

  <div id="footer-placeholder"></div>
