<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Nyctalopes - Mes fiches</title>
  <!-- Police fantasy -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <!-- Style CSS -->
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <!-- Contenu dynamique (en-tête et pied de page chargés par JS) -->
  <div id="header-placeholder"></div>
  <main>
    <!-- Section Connexion -->
    <section id="auth-section">
      <h2>Connexion</h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Mot de passe" required />
        <button type="submit">Se connecter</button>
      </form>
    </section>
    <!-- Section Liste des fiches (cachée au départ) -->
    <section id="fiches-list" style="display: none;">
      <!-- Les fiches seront chargées ici -->
    </section>
  </main>
  <div id="footer-placeholder"></div>

  <!-- Variables d'environnement Supabase (à remplacer par tes vraies valeurs) -->
  <script>
    window.SUPABASE_URL = "https://vlkiigbekxpbcwqhkkma.supabase.co";
    window.SUPABASE_KEY = "sb_publishable_CIafolW53uZ-s6XP1duTKA_SFRATTKA";
  </script>

  <!-- SDK Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- Chargement des templates header/footer -->
  <script>
    fetch('src/templates/header.html')
      .then(response => response.text())
      .then(html => document.getElementById('header-placeholder').innerHTML = html);

    fetch('src/templates/footer.html')
      .then(response => response.text())
      .then(html => document.getElementById('footer-placeholder').innerHTML = html);
  </script>

  <!-- Scripts en mode module (nécessaire pour les import/export ES6) -->
  <script type="module" src="src/js/ui.js"></script>
</body>
</html>
