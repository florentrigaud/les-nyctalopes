<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Nyctalops - Mes fiches</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Les Nyctalops</h1>
    <nav>
      <a href="index.html">Mes fiches</a>
      <a href="admin.html">Admin</a>
      <button id="signOutBtn">Déconnexion</button>
    </nav>
  </header>

  <main>
    <section id="auth-section">
  <h2 id="auth-title">Connexion</h2>
  
  <!-- Toggle -->
  <div id="auth-toggle">
    <button id="btnLogin" class="active">Se connecter</button>
    <button id="btnRegister">Créer un compte</button>
  </div>

  <!-- Formulaire Connexion -->
  <form id="login-form">
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Mot de passe" required />
    <button type="submit">Se connecter</button>
  </form>

  <!-- Formulaire Inscription -->
  <form id="register-form" style="display: none;">
    <input type="text" id="reg-username" placeholder="Nom d'utilisateur" required />
    <input type="email" id="reg-email" placeholder="Email" required />
    <input type="password" id="reg-password" placeholder="Mot de passe" required />
    <input type="password" id="reg-confirm" placeholder="Confirmer le mot de passe" required />
    <button type="submit">Créer mon compte</button>
  </form>

  <p id="auth-message"></p>
</section>
    <section id="fiches-list" style="display: none;">
      <!-- Les fiches seront chargées ici -->
    </section>
    
  </main>

  <footer>
    <p>© 2026 Les Nyctalops - Un projet JDR Pathfinder</p>
  </footer>

  <script type="module" src="src/js/auth.js"></script>
  <script type="module" src="src/js/data.js"></script>
  <script type="module" src="src/js/utils.js"></script>
  <script type="module" src="src/js/ui.js"></script>
</body>
</html>
